spring:
  application:
    name: fatihozkurtcom
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    deserialization:
      fail-on-unknown-properties: true
    default-property-inclusion: non_null
  messages:
    basename: i18n/messages,i18n/errors
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:20MB}
  jpa:
    open-in-view: false
  data:
    redis:
      repositories:
        enabled: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.fatihozkurt.fatihozkurtcom: INFO

app:
  locale:
    default-locale: ${APP_DEFAULT_LOCALE:en}
    header-name: ${APP_LOCALE_HEADER:X-Locale}
  jwt:
    issuer: ${JWT_ISSUER:fatihozkurtcom}
    access-expiration-minutes: ${JWT_ACCESS_EXP_MIN:15}
    refresh-expiration-days: ${JWT_REFRESH_EXP_DAYS:14}
    secret: ${JWT_SECRET:replace-this-secret-in-env}
  security:
    require-https: ${APP_REQUIRE_HTTPS:false}
    cors:
      allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4173,http://localhost:5173}
    cookies:
      secure: ${APP_COOKIE_SECURE:false}
      same-site: ${APP_COOKIE_SAMESITE:Lax}
      refresh-cookie-name: ${APP_REFRESH_COOKIE_NAME:refresh_token}
    rate-limit:
      login:
        max-attempts: ${RATE_LIMIT_LOGIN_MAX:5}
        window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SEC:600}
      forgot-password:
        max-attempts: ${RATE_LIMIT_FORGOT_MAX:3}
        window-seconds: ${RATE_LIMIT_FORGOT_WINDOW_SEC:1800}
      contact:
        max-attempts: ${RATE_LIMIT_CONTACT_MAX:5}
        window-seconds: ${RATE_LIMIT_CONTACT_WINDOW_SEC:600}
  admin:
    bootstrap:
      enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
      username: ${ADMIN_BOOTSTRAP_USERNAME:}
      password: ${ADMIN_BOOTSTRAP_PASSWORD:}
      email: ${ADMIN_BOOTSTRAP_EMAIL:}
  mail:
    from: ${APP_MAIL_FROM:noreply@fatihozkurt.com}
    provider: ${APP_MAIL_PROVIDER:log}
  docs:
    enabled: ${APP_DOCS_ENABLED:false}
  storage:
    enabled: ${APP_STORAGE_ENABLED:false}
    endpoint: ${APP_STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${APP_STORAGE_ACCESS_KEY:${MINIO_ROOT_USER:minioadmin}}
    secret-key: ${APP_STORAGE_SECRET_KEY:${MINIO_ROOT_PASSWORD:minioadmin}}
    region: ${APP_STORAGE_REGION:us-east-1}
    buckets:
      public-assets: ${APP_STORAGE_BUCKET_PUBLIC:public-assets}
      project-assets: ${APP_STORAGE_BUCKET_PROJECT:project-assets}
      resume-assets: ${APP_STORAGE_BUCKET_RESUME:resume-assets}
