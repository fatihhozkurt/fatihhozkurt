services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fatihozkurtcom-backend
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio
      - opensearch

  postgres:
    image: postgres:16
    container_name: fatihozkurtcom-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fatihozkurtcom}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fatihozkurtcom-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: fatihozkurtcom-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: fatihozkurtcom-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  postgres_data:
  minio_data:
  opensearch_data:
